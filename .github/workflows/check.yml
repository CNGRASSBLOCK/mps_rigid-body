name: check

on:
  push:
  pull_request:

jobs:
  rust-and-jni:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
      - name: Rust format
        run: cargo fmt --check
      - name: Rust clippy
        run: cargo clippy --all-targets -- -D warnings
      - name: Rust tests
        run: cargo test
      - name: JNI declaration sync
        run: python scripts/check_jni_java.py
      - name: JNI smoke test
        working-directory: test21
        run: .\gradlew.bat check
